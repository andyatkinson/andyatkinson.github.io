<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.name }}",
  "url": "{{ site.url }}",
  "image": "{{ site.url }}/{{ site.author.image }}",
  "sameAs": [
    "https://www.linkedin.com/in/{{ site.linkedin }}",
    "https://github.com/{{ site.github }}",
    "https://stackoverflow.com/users/{{ site.stackoverflow }}",
    "https://bsky.app/profile/{{ site.bluesky.username }}"
  ],
  "jobTitle": "{{ site.description }}",
  "worksFor": {
    "@type": "Organization",
    "name": "{{ site.works_for }}"
  }
}
</script>

<meta property="og:title" content="{{ page.title | default: site.meta_description }}" />
<meta property="og:description" content="{{ site.meta_description }}" />
<meta property="og:image" content="{{ page.social_share_image | default: site.social_share_default_image }}" alt="{{ page.title }}" />
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="author" content="{{ site.author.name }}">
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="{{ site.url}}{{ page.social_share_image | default: site.social_share_default_image }}"/>
<meta name="twitter:description" content="{{ page.title }}"/>
